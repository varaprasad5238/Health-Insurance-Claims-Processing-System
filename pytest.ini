[pytest]
testpaths = backend/tests
pythonpath = .
addopts = --cov=backend --cov-report=term-missing --cov-report=xml --cov-fail-under=80
asyncio_mode = auto

[coverage:run]
branch = True
omit =
    backend/tests/*
    backend/common/*
    backend/__init__.py
    */__init__.py

[coverage:report]
show_missing = True
skip_covered = True
